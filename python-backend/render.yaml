services:
  - type: web
    name: ask-shubham-retrieval
    env: python
    rootDir: python-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: KNOWLEDGE_DIR
        value: ../data/knowledge
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CORS_ORIGINS
        value: https://shubham-pareek-portfolio.vercel.app,http://localhost:3000
